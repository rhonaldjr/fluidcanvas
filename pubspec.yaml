name: inkpad
description: "InkPad — a cross-platform desktop freehand sketching app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  archive: ^4.0.9
  file_selector: ^1.1.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  path: ^1.9.1
  path_provider: ^2.1.6
  shared_preferences: ^2.5.5
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_async: ^1.3.3

flutter:
  uses-material-design: true

  assets:
    # Handed to GTK as the window icon at startup: an AppImage cannot resolve
    # an icon-theme name, so the pixels travel with the app. See 15.5.
    - packaging/linux/icons/hicolor/256x256/apps/inkpad.png
