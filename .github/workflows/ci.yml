name: CI

on:
  # Branches only. A bare `push:` also fires on tags, which would duplicate the
  # AppImage build that release.yml already runs for that tag.
  push:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

# A new push to a branch supersedes the run already in flight for it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.44.6

jobs:
  analyze-and-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test

      # `flutter analyze` already exits non-zero on info-level lints.
      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  appimage:
    name: Package
    needs: analyze-and-test
    uses: ./.github/workflows/build-appimage.yml
